<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>가위바위보 게임</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background: #f0f4ff;
            color: #1a1a1a;
        }
        .container {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 16px 40px rgba(0,0,0,0.12);
            padding: 28px;
            width: min(420px, 90vw);
            text-align: center;
        }
        h1 {
            margin-bottom: 16px;
        }
        .choices {
            display: flex;
            gap: 12px;
            justify-content: center;
            margin: 18px 0;
        }
        button {
            flex: 1;
            padding: 16px 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            background: #4a74ff;
            color: #ffffff;
            font-size: 1rem;
            transition: transform 0.2s ease, background 0.2s ease;
        }
        button:hover {
            transform: translateY(-2px);
            background: #3453d2;
        }
        .result {
            margin-top: 18px;
            padding: 18px;
            border-radius: 14px;
            background: #eef2ff;
            color: #1a1a1a;
        }
        .scoreboard {
            margin-top: 14px;
            display: flex;
            justify-content: space-between;
            gap: 12px;
            font-size: 0.95rem;
        }
        .scoreboard div {
            flex: 1;
            background: #eef0ff;
            border-radius: 12px;
            padding: 12px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>가위바위보</h1>
        <p>버튼을 눌러 컴퓨터와 대결하세요.</p>
        <div class="choices">
            <button data-choice="가위">가위</button>
            <button data-choice="바위">바위</button>
            <button data-choice="보">보</button>
        </div>
        <div class="result" id="result">
            결과가 여기에 표시됩니다.
        </div>
        <div class="scoreboard">
            <div>
                <strong>플레이어</strong>
                <div id="playerScore">0</div>
            </div>
            <div>
                <strong>컴퓨터</strong>
                <div id="computerScore">0</div>
            </div>
            <div>
                <strong>무승부</strong>
                <div id="drawScore">0</div>
            </div>
        </div>
    </div>

    <script>
        const choices = ["가위", "바위", "보"];
        const buttons = document.querySelectorAll('button[data-choice]');
        const resultEl = document.getElementById('result');
        const playerScoreEl = document.getElementById('playerScore');
        const computerScoreEl = document.getElementById('computerScore');
        const drawScoreEl = document.getElementById('drawScore');

        let playerScore = 0;
        let computerScore = 0;
        let drawScore = 0;

        function getComputerChoice() {
            return choices[Math.floor(Math.random() * choices.length)];
        }

        function decideWinner(player, computer) {
            if (player === computer) return '무승부';
            if (
                (player === '가위' && computer === '보') ||
                (player === '바위' && computer === '가위') ||
                (player === '보' && computer === '바위')
            ) {
                return '승리';
            }
            return '패배';
        }

        function updateScoreboard(result) {
            if (result === '승리') playerScore += 1;
            else if (result === '패배') computerScore += 1;
            else drawScore += 1;

            playerScoreEl.textContent = playerScore;
            computerScoreEl.textContent = computerScore;
            drawScoreEl.textContent = drawScore;
        }

        function playRound(playerChoice) {
            const computerChoice = getComputerChoice();
            const result = decideWinner(playerChoice, computerChoice);
            updateScoreboard(result);
            resultEl.innerHTML = `당신: <strong>${playerChoice}</strong><br>컴퓨터: <strong>${computerChoice}</strong><br><br>결과: <strong>${result}</strong>`;
        }

        buttons.forEach(button => {
            button.addEventListener('click', () => {
                playRound(button.dataset.choice);
            });
        });
    </script>
</body>
</html>
